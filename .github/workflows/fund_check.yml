name: Daily Fund Checker

on:
  schedule:
    # 每天中午 12:00 (北京时间 UTC+8) = 每天 04:00 (UTC)
    - cron: '0 4 * * *'
  workflow_dispatch: # 允许你在 GitHub 页面上手动点击运行，方便测试

jobs:
  check_fund:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run script
      env:
        # 在 GitHub Repository Secrets 中配置你的机器人 Webhook 地址
        WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
      run: python fund_checker.py
